<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClaw Instance Control Plane</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <h1>OpenClaw Instance Control Plane</h1>
      <p class="subtitle">Launch an instance with a secure UI tunnel profile.</p>
      <p id="status" aria-live="polite"></p>

      <form id="auth-form" class="card">
        <label>
          Operator/session bearer token
          <input
            name="bearerToken"
            id="bearer-token"
            type="password"
            autocomplete="current-password"
            placeholder="oclw_..."
          />
        </label>
        <button type="submit">Save Token</button>
      </form>

      <form id="token-session-form" class="card">
        <h2>Access Token Login</h2>
        <label>
          Instance ID
          <input name="instanceId" placeholder="instance-id" required />
        </label>
        <label>
          Instance access token
          <input
            name="accessToken"
            type="password"
            autocomplete="current-password"
            placeholder="token"
            required
          />
        </label>
        <button type="submit">Create Session Token</button>
      </form>

      <form id="wallet-challenge-form" class="card">
        <h2>Wallet Login</h2>
        <label>
          Instance ID
          <input name="instanceId" placeholder="instance-id" required />
        </label>
        <label>
          Owner wallet address
          <input name="walletAddress" placeholder="0x..." required />
        </label>
        <button type="submit">Get Challenge</button>
      </form>

      <form id="wallet-verify-form" class="card">
        <label>
          Challenge message (sign this exact text)
          <textarea id="challenge-message" rows="4" readonly></textarea>
        </label>
        <label>
          Challenge ID
          <input name="challengeId" id="challenge-id" placeholder="challenge-id" required />
        </label>
        <label>
          Signature
          <input name="signature" placeholder="0x..." required />
        </label>
        <button type="submit">Verify Wallet Session</button>
      </form>

      <form id="launch-form" class="card">
        <label>
          Instance name
          <input name="name" placeholder="team-assistant" required />
        </label>

        <label>
          Claw variant
          <select name="clawVariant" required>
            <option value="openclaw">OpenClaw</option>
            <option value="nanoclaw">NanoClaw</option>
            <option value="ironclaw">IronClaw</option>
          </select>
        </label>

        <label>
          Template pack
          <select name="templatePackId" id="template-select" required></select>
        </label>

        <label>
          Public subdomain (optional)
          <input
            name="uiSubdomain"
            placeholder="team-assistant"
            pattern="[a-zA-Z0-9-]+"
          />
        </label>

        <label>
          UI auth mode
          <select name="uiAuthMode" required>
            <option value="wallet_signature">Wallet signature</option>
            <option value="access_token">Access token</option>
          </select>
        </label>

        <button type="submit">Launch Instance</button>
      </form>

      <section class="card">
        <h2>Instances</h2>
        <ul id="instance-list"></ul>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
