<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="OpenClaw runtime control plane" />
    <title>OpenClaw Control Plane</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Sora:wght@500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    />
    <script>
      (function () {
        const key = 'openclaw_ui_theme';
        const saved = localStorage.getItem(key);
        const theme = saved || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <script type="module" crossorigin src="/app.js"></script>
    <link rel="stylesheet" crossorigin href="/styles.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        const c = globalThis.crypto;
        if (!c || typeof c.randomUUID === 'function' || typeof c.getRandomValues !== 'function') {
          return;
        }
        c.randomUUID = function () {
          const bytes = new Uint8Array(16);
          c.getRandomValues(bytes);
          bytes[6] = (bytes[6] & 15) | 64;
          bytes[8] = (bytes[8] & 63) | 128;
          const hex = Array.from(bytes, (value) => value.toString(16).padStart(2, '0')).join('');
          return (
            hex.slice(0, 8) +
            '-' +
            hex.slice(8, 12) +
            '-' +
            hex.slice(12, 16) +
            '-' +
            hex.slice(16, 20) +
            '-' +
            hex.slice(20)
          );
        };
      })();
    </script>
  </body>
</html>
