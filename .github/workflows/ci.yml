name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: tangle-network/blueprint
          ref: main
          path: blueprint

      - name: Link blueprint SDK checkout
        run: ln -sfn "$GITHUB_WORKSPACE/blueprint" "$GITHUB_WORKSPACE/../blueprint"

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  lint:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: tangle-network/blueprint
          ref: main
          path: blueprint

      - name: Link blueprint SDK checkout
        run: ln -sfn "$GITHUB_WORKSPACE/blueprint" "$GITHUB_WORKSPACE/../blueprint"

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: tangle-network/blueprint
          ref: main
          path: blueprint

      - name: Link blueprint SDK checkout
        run: ln -sfn "$GITHUB_WORKSPACE/blueprint" "$GITHUB_WORKSPACE/../blueprint"

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"

      - name: Run unit tests
        run: cargo test --workspace

  docker-integration:
    name: Docker integration (real runtime)
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: tangle-network/blueprint
          ref: main
          path: blueprint

      - name: Link blueprint SDK checkout
        run: ln -sfn "$GITHUB_WORKSPACE/blueprint" "$GITHUB_WORKSPACE/../blueprint"

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"

      - name: Run Docker integration tests
        run: ./scripts/ci/run-docker-integration-tests.sh

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: tangle-network/blueprint
          ref: main
          path: blueprint

      - name: Link blueprint SDK checkout
        run: ln -sfn "$GITHUB_WORKSPACE/blueprint" "$GITHUB_WORKSPACE/../blueprint"

      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      - name: Run cargo audit
        run: cargo audit
